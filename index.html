
<!DOCTYPE html>

<head>

<body>

<div id="cb-app-wrapper">
    <div id="watermark"></div>
A

        <div class="custom-confirm-box">
            <div id="custom-confirm-text" class="custom-confirm-text">Är du säker?</div>

        </div>
    </div>

    <div id="custom-alert-overlay" style="display: none;">

            <button id="custom-alert-ok" class="custom-confirm-btn custom-alert-ok">OK</button>
        </div>

    <div id="login-overlay">

                Logga in med Google
            </button>
            <div id="login-local-note" style="margin-top: 18px; font-size: 12px; color: #aaa;"></div>
        </div>
    </div>

    <button id="fullscreen-btn" onclick="toggleFullScreen()" title="Helskärm">⛶</button>
    <div id="canvas-container-v6"></div>
    
    <div id="pages-nav-v6">
        <div class="drag-handle-nav" title="Dra för att flytta">⋮⋮</div>
        <button id="prev-page-btn-v6" class="nav-btn" onclick="prevPageV6()" title="Föregående sida">‹</button>
        <span id="page-count-v6">1 / 1</span>

    </div>
    
    <div id="menu-hover-zone"></div>

    <div id="toolbar-container">

            <button class="tool-btn" onclick="createAlphabetWidget()"><div class="icon">🔤</div><div class="label">Alfabet</div></button>

            <button class="tool-btn" onclick="createWorkSymbols()"><div class="icon">🤫</div><div class="label">Arbetssätt</div></button>
            <button class="tool-btn" onclick="createRewardSystem()"><div class="icon">⭐</div><div class="label">Poäng</div></button>
            <button class="tool-btn" onclick="createStickyNote()"><div class="icon">📌</div><div class="label">Lapp</div></button>
            <button class="tool-btn" onclick="createGroupMaker()"><div class="icon">👥</div><div class="label">Grupper</div></button>
            <button class="tool-btn" onclick="createRandomName()"><div class="icon">🎲</div><div class="label">Slumpa</div></button>
            <button class="tool-btn" onclick="createWordOfTheDay()"><div class="icon">💡</div><div class="label">Dagens ord</div></button>
            <button class="tool-btn" onclick="createGOTD()"><div class="icon">🧠</div><div class="label">Grej of the day</div></button>
            <button class="tool-btn" onclick="createCalculator()"><div class="icon">🧮</div><div class="label">Räknare</div></button>
            <button class="tool-btn" onclick="createFractionVisualizer()"><div class="icon">🍕</div><div class="label">Bråk</div></button>
            <button class="tool-btn" onclick="createTableWidget()"><div class="icon">📊</div><div class="label">Tabell</div></button>
            <button class="tool-btn" onclick="createRealTimeClock()"><div class="icon">🕰️</div><div class="label">Klocka</div></button>
            <button class="tool-btn" onclick="createAnalogTimer()"><div class="icon">⏲️</div><div class="label">A. Timer</div></button>
            <button class="tool-btn" onclick="createTimer()"><div class="icon">⏱️</div><div class="label">D. Timer</div></button>
            <button class="tool-btn" onclick="createTrafficLight()"><div class="icon">🚦</div><div class="label">Ljuset</div></button>
            <button class="tool-btn" onclick="createQRCode()"><div class="icon">📱</div><div class="label">QR-Kod</div></button>
            <button class="tool-btn" onclick="createBgSelector()"><div class="icon">🎨</div><div class="label">Tavla</div></button>
            <button class="tool-btn" onclick="createBirthdayWidget()"><div class="icon">🎂</div><div class="label">Grattis</div></button>
            
            <div style="width: 1px; background: #ddd; margin: 0 4px;"></div>
            <button class="tool-btn" onclick="clearCurrentPage()"><div class="icon">🗑️</div><div class="label">Rensa</div></button>
            <button class="tool-btn" onclick="logoutUser()"><div class="icon">🚪</div><div class="label">Logga ut</div></button>
        </div>

</div>

    #custom-confirm-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(3px); z-index: 25000; display: flex; align-items: center; justify-content: center; }
    .custom-confirm-box { background: white; padding: 20px 25px; border-radius: 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.25); text-align: center; max-width: 280px; width: 90%; animation: popIn 0.2s ease-out; border: 1px solid #e5e5ea; }

    #custom-alert-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.35); backdrop-filter: blur(4px); z-index: 25500; display: flex; align-items: center; justify-content: center; }

    #fullscreen-btn { position: absolute; top: 20px; right: 20px; z-index: 10000; background: rgba(255, 255, 255, 0.95); padding: 8px 12px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); border: 1px solid rgba(0,0,0,0.06); cursor: pointer; font-size: 18px; color: #333; transition: all 0.2s; backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; font-weight: bold; }

    #menu-hover-zone { position: absolute; bottom: 0; left: 0; width: 100%; height: 60px; z-index: 9998; }
    #toolbar-container { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(50px); width: 95%; max-width: 1400px; background: rgba(255, 255, 255, 0.95); border-radius: 20px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2); border: 1px solid rgba(0, 0, 0, 0.08); padding: 8px 15px; z-index: 9999; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); opacity: 0; visibility: hidden; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

    .tool-group { display: flex; gap: 2px; justify-content: center; width: 100%; flex-wrap: wrap; }

    .tool-btn:hover { background-color: #f2f2f7; transform: translateY(-3px); }

    #side-pocket-zone { position: fixed; top: 50%; right: 0; transform: translateY(-50%); z-index: 10500; width: 0; height: 64px; }
    #side-pocket-tab { position: absolute; top: 0; right: 0; width: 26px; height: 64px; background: rgba(255,255,255,0.95); border: 1px solid rgba(0,0,0,0.08); border-right: none; border-radius: 14px 0 0 14px; box-shadow: -4px 4px 16px rgba(0,0,0,0.12); display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; color: #888; transition: all 0.25s ease; }

    /* WIDGET STIL & GAP FIX */
    .widget { position: absolute; z-index: 10; display: flex; flex-direction: column; min-width: 150px; min-height: 100px; transition: width 0.3s ease; }
    
    .widget-header { position: absolute; top: 0; left: 0; width: 100%; background: #ff3b30; padding: 8px 12px; cursor: move; display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 700; color: white; letter-spacing: 0.5px; border-radius: 14px 14px 0 0; transform: translateY(10px); opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: -1; white-space: nowrap; overflow: hidden; }
    
    .widget:hover .widget-header, .widget:focus-within .widget-header { transform: translateY(calc(-100% + 2px)) !important; opacity: 1 !important; pointer-events: auto !important; }
    .widget:not(.schedule-widget):hover .widget-inner, .widget:not(.schedule-widget):focus-within .widget-inner { border-top-left-radius: 0 !important; border-top-right-radius: 0 !important; }

    .widget-resizer { position: absolute; right: 0; bottom: 0; width: 16px; height: 16px; cursor: se-resize; z-index: 20; opacity: 0; transition: opacity 0.3s; }

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
    let widgetCount = 0; let pagesListV6 = []; let currentPageIndexV6 = -1;
    window.isLoadingBoard = true; let currentUser = null;

    /* =====================================================================
       CENTRAL MOLNLAGRING via FIREBASE
       Alla loggar in fritt med Google. Varje inloggning registreras centralt så
       att DU som admin kan se vilka som använder appen och ta bort en obehörig.
       All tavel-data lagras centralt och följer med mellan datorer.

       SÅ HÄR KOPPLAR DU PÅ DET (engångsinställning – jag guidar dig):
       1. Gå till  https://console.firebase.google.com  och skapa/lägg till ett projekt
          (du kan välja ditt befintliga "Min Tavla"-projekt).
       2. Build -> "Authentication" -> Get started -> fliken "Sign-in method"
          -> välj "Google" -> Enable -> Save.
       3. Build -> "Firestore Database" -> Create database (Production mode går bra).
       4. Authentication -> Settings -> "Authorized domains" -> Add domain
          -> lägg till:  kundpost-hh.github.io
       5. Kugghjul (Project settings) -> "Your apps" -> webb-ikonen </> -> registrera app
          -> kopiera värdena i "firebaseConfig" och klistra in nedan.
       Lämnar du värdena som de är fungerar appen lokalt (sparar bara på datorn).
       ===================================================================== */
    const firebaseConfig = {
        apiKey:            "AIzaSyDrb-6YOpIgfRT5TYQ9w9htT5_W-DY3EsM",
        authDomain:        "min-tavla-ec027.firebaseapp.com",
        projectId:         "min-tavla-ec027",
        storageBucket:     "min-tavla-ec027.firebasestorage.app",
        messagingSenderId: "384942566077",
        appId:             "1:384942566077:web:b2807f75002846340ae5d4"
    };
    // E-postadresser som ska ha admin-rättigheter (se/ta bort användare)
    const ADMIN_EMAILS = ["hussein.hirori@utb.linkoping.se"];

    window.cloudReady = false;
    let fbAuth = null, fbDB = null, fbUser = null;
    function cloudConfigured(){ return firebaseConfig.projectId && firebaseConfig.projectId.indexOf('DITT_') !== 0; }
    function isAdminEmail(email){ return ADMIN_EMAILS.map(e=>e.toLowerCase()).indexOf((email||'').toLowerCase()) !== -1; }
    (function initCloud(){
        try {
            if (!cloudConfigured()) { console.info('[MinTavla] Firebase ej konfigurerad – sparar lokalt. Fyll i firebaseConfig för att aktivera.'); return; }
            if (typeof firebase === 'undefined') { console.warn('[MinTavla] Firebase-SDK kunde inte laddas – kör lokalt.'); return; }
            firebase.initializeApp(firebaseConfig);
            fbAuth = firebase.auth(); fbDB = firebase.firestore();
            window.cloudReady = true;
            console.info('[MinTavla] Central molnlagring aktiv ✔');
        } catch(e){ console.warn('[MinTavla] Kunde inte starta Firebase, kör lokalt:', e); window.cloudReady = false; }
    })();

    // Liten egen alert-ruta (återanvänder den befintliga overlayen)
    function customAlert(message, icon){
        const ov = document.getElementById('custom-alert-overlay');
        const tx = document.getElementById('custom-alert-text');
        const ic = ov.querySelector('.custom-alert-icon');
        const ok = document.getElementById('custom-alert-ok');
        if(ic) ic.innerText = icon || 'ℹ️';
        tx.innerText = message; ov.style.display = 'flex';
        ok.onclick = () => { ov.style.display = 'none'; ok.onclick = null; };
    }

    // Samla ihop all data för aktuell användare från localStorage
    function cloudGatherData(){
        return {
            board:      localStorage.getItem('boardStateV6_' + currentUser) || '',
            classLists: localStorage.getItem('savedClassLists_' + currentUser) || '',
            gotdLists:  localStorage.getItem('savedGOTDLists_') || '',
            wordLists:  localStorage.getItem('savedWordLists_') || ''
        };
    }

    // Skriv tillbaka molndata till localStorage (så resten av appen kan läsa som vanligt)
    function cloudApplyData(d){
        if (!d) return;
        if (typeof d.board === 'string'){ if(d.board) localStorage.setItem('boardStateV6_' + currentUser, d.board); else localStorage.removeItem('boardStateV6_' + currentUser); }
        if (typeof d.classLists === 'string' && d.classLists) localStorage.setItem('savedClassLists_' + currentUser, d.classLists);
        if (typeof d.gotdLists === 'string' && d.gotdLists) localStorage.setItem('savedGOTDLists_', d.gotdLists);
        if (typeof d.wordLists === 'string' && d.wordLists) localStorage.setItem('savedWordLists_', d.wordLists);
    }

    // Gör om e-post till en säker dokument-nyckel (Firestore tillåter inte vissa tecken)
    function emailKey(email){ return (email||'').toLowerCase().replace(/[^a-z0-9]/g, '_'); }

    // Hämta ner användarens data från molnet vid inloggning
    async function syncFromCloud(user){
        if (!window.cloudReady || !user) return;
        try {
            const snap = await fbDB.collection('boards').doc(emailKey(user)).get();
            if (snap.exists) cloudApplyData(snap.data());
        } catch(err){ console.warn('[MinTavla] Kunde inte hämta från molnet:', err); }
    }

    // Spara upp till molnet (fördröjt så vi inte skickar vid varje tangenttryck)
    let cloudSyncTimer = null;
    function syncToCloud(){
        if (!window.cloudReady || !currentUser) return;
        clearTimeout(cloudSyncTimer);
        cloudSyncTimer = setTimeout(()=>{
            const payload = cloudGatherData(); payload.updatedAt = Date.now();
            fbDB.collection('boards').doc(emailKey(currentUser)).set(payload, { merge:true })
                .catch(err => console.warn('[MinTavla] Molnsparning misslyckades:', err));
        }, 1200);
    }

    // Registrera/uppdatera användaren i den centrala listan
    async function registerUser(email, name){
        try {
            const ref = fbDB.collection('users').doc(emailKey(email));
            const snap = await ref.get();
            const now = Date.now();
            const data = { email: email, name: name || '', lastSeen: now };
            if (!snap.exists || !snap.data().firstSeen) data.firstSeen = now;
            await ref.set(data, { merge:true });
        } catch(err){ console.warn('[MinTavla] Kunde inte registrera användare:', err); }
    }

    // Logga in med Google (öppet för alla). Resten sköts av onAuthStateChanged.
    async function signInWithGoogle(){
        if (!window.cloudReady){ customAlert('Inloggning är inte konfigurerad ännu (firebaseConfig saknas).', '⚠️'); return; }
        try {
            const provider = new firebase.auth.GoogleAuthProvider();
            await fbAuth.signInWithPopup(provider);
        } catch(err){
            if (err && (err.code === 'auth/popup-closed-by-user' || err.code === 'auth/cancelled-popup-request')) return;
            console.warn(err); customAlert('Inloggningen kunde inte slutföras. Försök igen.', '⚠️');
        }
    }

    // Körs när någon är inloggad (både vid nytt klick och vid auto-återställd session)
    let _handlingSignIn = false;
    async function handleSignedIn(user){
        if (_handlingSignIn) return; _handlingSignIn = true;
        try {
            const email = user.email; const name = user.displayName || '';
            // Borttagen/blockerad av admin?
            try {
                const usnap = await fbDB.collection('users').doc(emailKey(email)).get();
                if (usnap.exists && usnap.data().blocked && !isAdminEmail(email)){
                    await fbAuth.signOut();
                    customAlert('Din åtkomst till Min Tavla har tagits bort. Kontakta administratören om det är fel.', '🔒');
                    return;
                }
            } catch(e){ /* om kontrollen inte går, släpp ändå in */ }
            fbUser = user; currentUser = email;
            localStorage.setItem('classboardzUser', currentUser);
            await registerUser(email, name);
            await syncFromCloud(email);
            document.getElementById('login-overlay').style.display = 'none';
            migrateOldLists(currentUser); initBoard();
            updateAdminButton();
        } finally { _handlingSignIn = false; }
    }

    // ---- ADMIN: visa och hantera vilka som använder appen ----
    function updateAdminButton(){
        const existing = document.getElementById('admin-corner');
        if (currentUser && isAdminEmail(currentUser)){
            if (!existing){
                const zone = document.createElement('div'); zone.id = 'admin-corner';
                const b = document.createElement('button');
                b.id = 'admin-fab'; b.title = 'Hantera användare (göms under presentationer)';
                b.innerHTML = '👥 Användare';
                b.onclick = openAdminPanel;
                zone.appendChild(b);
                document.getElementById('cb-app-wrapper').appendChild(zone);
                let hideT = null;
                const show = ()=>{ clearTimeout(hideT); zone.classList.add('admin-show'); };
                const hideSoon = ()=>{ clearTimeout(hideT); hideT = setTimeout(()=> zone.classList.remove('admin-show'), 500); };
                zone.addEventListener('mouseenter', show);
                zone.addEventListener('mouseleave', hideSoon);
                b.addEventListener('mouseenter', show);
                b.addEventListener('mouseleave', hideSoon);
            }
        } else if (existing){ existing.remove(); }
    }

    async function openAdminPanel(){
        const overlay = document.getElementById('admin-panel-overlay');
        const listEl = document.getElementById('admin-user-rows');
        overlay.style.display = 'flex';
        listEl.innerHTML = '<div style="padding:20px;text-align:center;color:#888;">Hämtar användare…</div>';
        try {
            const snap = await fbDB.collection('users').orderBy('lastSeen', 'desc').get();
            if (snap.empty){ listEl.innerHTML = '<div style="padding:20px;text-align:center;color:#888;">Inga användare ännu.</div>'; return; }
            listEl.innerHTML = '';
            snap.forEach(doc => {
                const u = doc.data();
                const row = document.createElement('div'); row.className = 'admin-user-row';
                const blocked = !!u.blocked;
                const last = u.lastSeen ? new Date(u.lastSeen).toLocaleString('sv-SE') : '–';
                row.innerHTML = `
                    <div class="admin-user-info">
                        <div class="admin-user-name">${(u.name||'(utan namn)')}${isAdminEmail(u.email)?' <span style=\"color:#7c3aed;font-weight:700;\">(admin)</span>':''}${blocked?' <span style=\"color:#ff3b30;font-weight:700;\">(borttagen)</span>':''}</div>
                        <div class="admin-user-mail">${u.email||''}</div>
                        <div class="admin-user-last">Senast inne: ${last}</div>
                    </div>`;
                const actions = document.createElement('div');
                if (!isAdminEmail(u.email)){
                    const btn = document.createElement('button');
                    btn.className = 'btn ' + (blocked ? 'btn-secondary' : 'btn-danger');
                    btn.innerText = blocked ? 'Återställ' : 'Ta bort';
                    btn.onclick = () => toggleBlockUser(u.email, !blocked);
                    actions.appendChild(btn);
                }
                row.appendChild(actions);
                listEl.appendChild(row);
            });
        } catch(err){
            console.warn(err);
            listEl.innerHTML = '<div style="padding:20px;text-align:center;color:#ff3b30;">Kunde inte hämta listan. Kontrollera internet.</div>';
        }
    }

    function toggleBlockUser(email, block){
        const msg = block ? ('Ta bort åtkomst för ' + email + '? Personen kan då inte logga in.') : ('Återställ åtkomst för ' + email + '?');
        customConfirm(msg, async () => {
            try {
                await fbDB.collection('users').doc(emailKey(email)).set({ blocked: block }, { merge:true });
                openAdminPanel();
            } catch(err){ console.warn(err); customAlert('Kunde inte uppdatera. Försök igen.', '⚠️'); }
        });
    }
    function closeAdminPanel(){ document.getElementById('admin-panel-overlay').style.display = 'none'; }

    function customConfirm(message, onConfirm) {
        const overlay = document.getElementById('custom-confirm-overlay');
        const textEl = document.getElementById('custom-confirm-text');
        const btnYes = document.getElementById('custom-confirm-yes');
        const btnNo = document.getElementById('custom-confirm-no');
        textEl.innerText = message; overlay.style.display = 'flex';
        const cleanup = () => { overlay.style.display = 'none'; btnYes.onclick = null; btnNo.onclick = null; };
        btnYes.onclick = () => { cleanup(); onConfirm(); };
        btnNo.onclick = () => { cleanup(); };
    }

    function toggleFullScreen() {
        const appWrapper = document.getElementById('cb-app-wrapper');
        if (!document.fullscreenElement) { appWrapper.requestFullscreen().catch(err => { alert(`Kunde inte starta helskärmsläge: ${err.message}`); }); } 
        else { document.exitFullscreen(); }
    }

    function checkLogin() {
        if (!window.cloudReady) {
            // Firebase ej konfigurerad -> kör lokalt så att appen går att använda/förhandsvisa
            currentUser = localStorage.getItem('classboardzUser') || 'lokal';
            localStorage.setItem('classboardzUser', currentUser);
            document.getElementById('login-overlay').style.display = 'none';
            migrateOldLists(currentUser); initBoard();
            return;
        }
        // Firebase: lyssna på inloggningsstatus – återställer sessionen automatiskt vid omladdning
        fbAuth.onAuthStateChanged((user) => {
            if (user){ handleSignedIn(user); }
            else {
                currentUser = null;
                document.getElementById('canvas-container-v6').innerHTML = ''; pagesListV6 = [];
                document.getElementById('login-overlay').style.display = 'flex';
                updateAdminButton();
            }
        });
    }

    function migrateOldLists(u){ const k='savedClassLists_'+u; if(!localStorage.getItem(k)) localStorage.setItem(k, JSON.stringify({'Klass 3A':'Kalle\nSara\nErik\nEmma\nLucas'})); }

    function logoutUser() {
        customConfirm('Vill du logga ut?', () => {
            saveBoardState();
            currentUser = null; localStorage.removeItem('classboardzUser');
            document.getElementById('canvas-container-v6').innerHTML = ''; pagesListV6 = [];
            updateAdminButton();
            if (window.cloudReady && fbAuth){ fbAuth.signOut().catch(()=>{}); }
            else { document.getElementById('login-overlay').style.display = 'flex'; }
        });
    }

    // SPAR KANAL - SYNCAD OCH SÄKRAD FÖR FLERA ANVÄNDARE
    function saveBoardState() {
        if(window.isLoadingBoard || !currentUser) return;
        const pages = []; const canvasPages = document.querySelectorAll('.canvas-page');
        canvasPages.forEach(page => {
            const pageData = { id: page.id, bgImage: page.style.backgroundImage, widgets: [] };
            page.querySelectorAll('.widget').forEach(w => {
                const type = w.dataset.widgetType;
                const state = { type: type, x: parseInt(w.style.left), y: parseInt(w.style.top), w: parseInt(w.style.width), h: parseInt(w.style.height), minimized: w.dataset.minimized === 'true', locked: w.classList.contains('locked'), data: {} };
                
                if (type === 'KLISTERLAPP') { state.data.title = w.querySelector('.sticky-title-input')?.value || ''; state.data.text = w.querySelector('.sticky-textarea')?.value || ''; }
                else if (type === 'TEXTEDITOR') { state.data.html = w.querySelector('.editor-content')?.innerHTML || ''; }
                else if (type === 'DAGSSCHEMA' || type === 'DAGENS SCHEMA') { state.data.rows = []; w.querySelectorAll('.schedule-row').forEach(r => { state.data.rows.push({ time: r.querySelector('.schedule-time-input')?.value || '', task: r.querySelector('.schedule-task-input')?.value || '', icon: r.querySelector('.schedule-icon-select')?.value || '📝', color: r.querySelector('.schedule-color-strip')?.dataset.color || '#e5e5ea' }); }); }
                else if (type === 'LEKTIONSSCHEMA') { const inps = w.querySelectorAll('.lesson-header-input'); state.data.subj = inps[0]?.value || ''; state.data.cls = inps[1]?.value || ''; state.data.date = inps[2]?.value || ''; state.data.goal = w.querySelector('.lesson-goal-input')?.value || ''; state.data.url = w.querySelector('.lesson-link-input')?.value || ''; state.data.tMin = w.querySelector('.lesson-timer-input')?.value || '10'; const cT = w.querySelectorAll('.lesson-card-title'); state.data.col1Title = cT[0]?.value || ''; state.data.col2Title = cT[1]?.value || ''; state.data.col3Title = cT[2]?.value || ''; const cC = w.querySelectorAll('.lesson-card-content'); state.data.col1Html = cC[0]?.innerHTML || ''; state.data.col2Html = cC[1]?.innerHTML || ''; state.data.col3Html = cC[2]?.innerHTML || ''; }
                else if (type === 'SKAPA GRUPPER' || type === 'SLUMPA NAMN' || type === 'DAGENS ORD') { state.data.list = w.querySelector('select')?.value || ''; state.data.text = w.querySelector('.name-input')?.value || ''; if(type === 'SKAPA GRUPPER') { state.data.count = w.querySelector('input[type="number"]')?.value || '4'; state.data.result = w.querySelector('.group-result')?.innerHTML || ''; } if(type === 'SLUMPA NAMN') { state.data.removeCb = w.querySelector('input[type="checkbox"]')?.checked || false; } if(type === 'DAGENS ORD') { state.data.result = w.querySelector('.name-result')?.innerHTML || ''; } }
                else if (type === 'TABELL') { state.data.html = w.querySelector('.board-table')?.innerHTML || ''; state.data.rows = w.querySelectorAll('tr').length; state.data.cols = w.querySelector('tr')?.querySelectorAll('td').length || 0; }
                else if (type === 'TRAFIKLJUS') { const act = w.querySelector('.light.active'); if(act) state.data.color = act.classList.contains('red') ? 'red' : act.classList.contains('yellow') ? 'yellow' : 'green'; }
                else if (type === 'DIGITAL TIMER' || type === 'BRÅK / TID') { const nIn = w.querySelectorAll('input[type="number"]'); if(nIn.length >= 2){ if(type === 'DIGITAL TIMER'){ state.data.min = nIn[0].value; state.data.sec = nIn[1].value; } else { state.data.num = nIn[0].value; state.data.den = nIn[1].value; } } }
                else if (type === 'RITPLATTA') { state.data.img = w.querySelector('canvas')?.toDataURL() || ''; }
                else if (type === 'QR-KOD') { state.data.url = w.querySelector('.list-name-input')?.value || ''; }
                else if (type === 'ARBETSSÄTT') { state.data.icon = w.querySelector('.work-symbol.active')?.dataset.icon || ''; }
                else if (type === 'BELÖNING') { state.data.points = w.querySelectorAll('.reward-star').length; }
                else if (type === 'GRATTIS') { state.data.name = w.querySelector('.grattis-name-input')?.value || ''; }
                
                // DATA-MINNE FÖR GREJ OF THE DAY WIDGET SÄKRAD
                else if (type === 'GREJ OF THE DAY') {
                    const sel = w.querySelector('select'); state.data.list = sel ? sel.value : '';
                    const nameInp = w.querySelector('textarea'); state.data.text = nameInp ? nameInp.value : '';
                    const res = w.querySelector('.name-result'); state.data.result = res ? res.innerHTML : '';
                    const btnRoll = w.querySelector('.btn-roll-g');
                    state.data.btnText = btnRoll ? btnRoll.innerText : 'Slumpa grej!';
                    state.data.btnState = btnRoll ? btnRoll.dataset.state : 'roll';
                    state.data.currentFacts = btnRoll ? btnRoll.dataset.currentFacts : '';
                    state.data.currentAnswer = btnRoll ? btnRoll.dataset.currentAnswer : '';
                }
                pageData.widgets.push(state);
            });
            pages.push(pageData);
        });
        localStorage.setItem('boardStateV6_' + currentUser, JSON.stringify({ pages: pages, activePage: currentPageIndexV6, bodyClass: document.getElementById('cb-app-wrapper').className }));
        syncToCloud();
    }

    // BASE DRAG ENGINE
    function createWidget(title, width, customClass, config) {
        if(!customClass) customClass = ''; widgetCount++;
        const widget = document.createElement('div'); widget.className = 'widget ' + customClass; widget.dataset.widgetType = title;
        if (config) { widget.style.width = config.w + 'px'; if (config.h) widget.style.height = config.h + 'px'; widget.style.top = Math.max(40, config.y) + 'px'; widget.style.left = config.x + 'px'; if(config.locked) widget.classList.add('locked'); }
        else { widget.style.width = width + 'px'; widget.style.top = (60 + (widgetCount * 20) % 200) + 'px'; widget.style.left = (50 + (widgetCount * 20) % 350) + 'px'; }
        
        const body = document.createElement('div'); body.className = 'widget-body';
        const inner = document.createElement('div'); inner.className = 'widget-inner';
        const header = document.createElement('div'); header.className = 'widget-header';
        
        header.innerHTML = `<span>${title}</span><div class='widget-controls'><span class='widget-ctrl-icon btn-min'>➖</span><span class='widget-ctrl-icon btn-lck'>🔓</span><span class='widget-ctrl-icon widget-close-icon'>✖</span></div>`;
        const lockIcon = header.querySelector('.btn-lck'); lockIcon.innerHTML = widget.classList.contains('locked') ? '🔒' : '🔓';
        
        inner.appendChild(body); widget.appendChild(header); widget.appendChild(inner);
        const resizer = document.createElement('div'); resizer.className = 'widget-resizer'; widget.appendChild(resizer);
        getActiveCanvasV6().appendChild(widget); makeDraggable(widget, header); makeResizable(widget, resizer);
        
        header.querySelector('.widget-close-icon').onclick = (e) => { e.stopPropagation(); customConfirm("Vill du stänga rutan?", () => { widget.remove(); saveBoardState(); }); };
        header.querySelector('.btn-min').onclick = (e) => { e.stopPropagation(); const m = body.style.display === 'none'; body.style.display = m ? 'flex' : 'none'; widget.dataset.minimized = m ? 'false' : 'true'; saveBoardState(); };
        lockIcon.onclick = (e) => { e.stopPropagation(); widget.classList.toggle('locked'); lockIcon.innerHTML = widget.classList.contains('locked') ? '🔒' : '🔓'; saveBoardState(); };
        if(config && config.minimized) { body.style.display = 'none'; widget.dataset.minimized = 'true'; }
        return body;
    }
    
    function makeDraggable(el, h) {
        let p1=0, p2=0, p3=0, p4=0; h.onmousedown = (e) => {
            if(el.classList.contains('locked') || ['INPUT','TEXTAREA','SELECT','BUTTON'].includes(e.target.tagName) || e.target.hasAttribute('contenteditable') || e.target.classList.contains('schedule-color-strip')) return;
            e.preventDefault(); p3=e.clientX; p4=e.clientY;
            document.onmouseup = () => { document.onmouseup=null; document.onmousemove=null; saveBoardState(); };
            document.onmousemove = (ev) => { ev.preventDefault(); p1=p3-ev.clientX; p2=p4-ev.clientY; p3=ev.clientX; p4=ev.clientY; el.style.top = Math.max(40, el.offsetTop-p2)+"px"; el.style.left = (el.offsetLeft-p1)+"px"; };
        }
    }
    function makeResizable(el, r) {
        let sX, sY, sW, sH; r.onmousedown = (e) => {
            if(el.classList.contains('locked')) return; e.preventDefault(); e.stopPropagation(); sX=e.clientX; sY=e.clientY; sW=el.offsetWidth; sH=el.offsetHeight;
            const drag = (ev) => { el.style.width = (sW+ev.clientX-sX)+'px'; el.style.height = (sH+ev.clientY-sY)+'px'; };
            const stop = () => { document.removeEventListener('mousemove',drag); document.removeEventListener('mouseup',stop); saveBoardState(); };
            document.addEventListener('mousemove',drag); document.addEventListener('mouseup',stop);
        }
    }

    // PAGES LOGIK
    function createPageV6(isInitial = false) { const pageId = Date.now() + '-' + Math.random().toString(16).slice(2); const canvasPage = document.createElement('div'); canvasPage.className = 'canvas-page'; canvasPage.id = pageId; document.getElementById('canvas-container-v6').appendChild(canvasPage); pagesListV6.push({ id: pageId, canvas: canvasPage }); if (isInitial) goToPageByIndexV6(0); else goToPageByIndexV6(pagesListV6.length - 1); }
    function goToPageByIndexV6(index) { if (index < 0 || index >= pagesListV6.length) return; const canvasPages = document.querySelectorAll('.canvas-page'); for(let i=0; i<canvasPages.length; i++) { canvasPages[i].classList.remove('active'); } pagesListV6[index].canvas.classList.add('active'); currentPageIndexV6 = index; updatePagesNavV6(); }
    function prevPageV6() { goToPageByIndexV6(currentPageIndexV6 - 1); saveBoardState(); } function nextPageV6() { goToPageByIndexV6(currentPageIndexV6 + 1); saveBoardState(); } function addPageV6() { createPageV6(); saveBoardState(); }

    // ---- POPUP-HJÄLPARE (konfetti + vinnarruta + Grej of the day-steg) ----
    function spawnPopupConfetti(container, amount){
        const colors = ['#ff3b30','#ff9500','#ffcc00','#4cd964','#5ac8fa','#007aff','#5856d6','#ff2d55','#7c3aed'];
        const n = amount || 90;
        for(let i=0;i<n;i++){
            const c = document.createElement('div');
            c.className = 'popup-confetti';
            c.style.left = (Math.random()*100) + '%';
            const col = colors[Math.floor(Math.random()*colors.length)];
            c.style.color = col; c.style.background = col;
            const size = (6 + Math.random()*8);
            c.style.width = size + 'px'; c.style.height = size + 'px';
            if(Math.random() > 0.5) c.style.borderRadius = '50%';
            c.style.animationDuration = (1.4 + Math.random()*1.8) + 's';
            c.style.animationDelay = (Math.random()*0.4) + 's';
            container.appendChild(c);
        }
    }

    // Grej of the day - steg för steg: Ledtråd -> Fakta -> Ord
    function showGotdPopup(clue, facts, answer){
        facts = (facts || []).filter(f => f && f.trim().length > 0);
        const wrapper = document.getElementById('cb-app-wrapper');
        const overlay = document.createElement('div');
        overlay.className = 'popup-overlay';
        const box = document.createElement('div');
        box.className = 'popup-box';
        box.style.borderColor = '#7c3aed';
        box.style.padding = '32px 44px';
        box.style.maxWidth = '640px';
        box.style.minWidth = '380px';
        box.style.maxHeight = '88vh';
        box.style.overflowY = 'auto';
        box.innerHTML = `
            <div style="font-size:20px;font-weight:900;letter-spacing:2px;color:#7c3aed;text-transform:uppercase;margin-bottom:18px;">🧠 Grej of the day</div>
            <div class="gotd-pop-content" style="display:flex;flex-direction:column;gap:12px;align-items:stretch;text-align:left;"></div>
            <button class="gotd-pop-btn" style="margin-top:24px;width:100%;padding:14px;font-size:18px;font-weight:800;background:#7c3aed;color:white;border:none;border-radius:12px;cursor:pointer;transition:transform 0.15s,filter 0.15s;">📖 Visa fakta →</button>`;
        overlay.appendChild(box);
        wrapper.appendChild(overlay);

        const content = box.querySelector('.gotd-pop-content');
        const btn = box.querySelector('.gotd-pop-btn');
        btn.onmouseover = ()=>{ btn.style.filter='brightness(1.1)'; btn.style.transform='scale(1.02)'; };
        btn.onmouseout  = ()=>{ btn.style.filter='none'; btn.style.transform='scale(1)'; };

        // Steg 1: Ledtråd
        content.innerHTML = `
            <div style="font-size:14px;font-weight:800;color:#7c3aed;letter-spacing:1px;">📌 LEDTRÅD</div>
            <div style="font-size:28px;font-weight:800;color:#1f2937;line-height:1.3;background:#f3e8ff;border:2px solid #e9d5ff;border-radius:14px;padding:18px 22px;text-align:center;">${clue}</div>`;

        let step = 1;
        const close = ()=>{ overlay.style.opacity='0'; box.style.transform='scale(0.5)'; setTimeout(()=>overlay.remove(),300); };

        // Om det inte finns några fakta hoppar vi direkt till ordet i steg 2
        if(facts.length === 0) btn.innerHTML = '🎯 Visa ordet →';

        btn.onclick = (e)=>{
            e.stopPropagation();
            if(step === 1 && facts.length > 0){
                let html = `<div style="font-size:14px;font-weight:800;color:#7c3aed;letter-spacing:1px;margin-top:6px;">📖 FAKTA</div>`;
                facts.forEach((f, i)=>{
                    html += `<div style="font-size:19px;color:#374151;line-height:1.4;background:#fdfafe;border:1.5px dashed rgba(168,85,247,0.5);border-radius:10px;padding:12px 16px;animation:popIn 0.25s ease ${i*0.12}s both;">• ${f}</div>`;
                });
                content.insertAdjacentHTML('beforeend', html);
                btn.innerHTML = '🎯 Visa ordet →';
                box.scrollTop = box.scrollHeight;
                step = 2;
            } else if(step === 1 || step === 2){
                content.insertAdjacentHTML('beforeend',
                    `<div style="font-size:14px;font-weight:800;color:#7c3aed;letter-spacing:1px;margin-top:6px;">🎯 ORD</div>
                     <div style="font-size:46px;font-weight:900;color:#ff3b30;text-align:center;text-shadow:2px 2px 0 rgba(0,0,0,0.08);animation:popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);">${answer}</div>`);
                spawnPopupConfetti(overlay);
                btn.innerHTML = '✓ Klart!';
                box.scrollTop = box.scrollHeight;
                step = 3;
            } else {
                close();
            }
        };

        overlay.addEventListener('click', (e)=>{ if(e.target===overlay) close(); });
        requestAnimationFrame(()=>{ overlay.style.opacity='1'; box.style.transform='scale(1)'; });
    }

            res.innerHTML = '🎲 Slumpar...';
            let ct = 0;
            let iv = setInterval(()=>{
                let raw = n[Math.floor(Math.random()*n.length)];
                res.innerText = '🎲 ' + raw.split(/[\/|]/)[0].trim();
                ct++;
                if(ct > 10){
                    clearInterval(iv);
                    let line = n[Math.floor(Math.random()*n.length)];
                    let parts = line.split(/[\/|]/).map(x=>x.trim()).filter(x=>x.length>0);
                    let clue, facts, answer;
                    if(parts.length <= 1){
                        clue = parts[0] || ''; facts = []; answer = parts[0] || '';
                    } else {
                        clue = parts[0];
                        answer = parts[parts.length - 1];
                        facts = parts.slice(1, parts.length - 1); // 0, 1, 2, 3 ... fakta stöds
                    }
                    res.innerHTML = `<div style='color:#7c3aed;font-size:15px;font-weight:bold;background:#f3e8ff;padding:10px 14px;border-radius:10px;border:1px solid #e9d5ff;width:100%;'>📌 ${clue}</div>`;
                    saveBoardState();
                    showGotdPopup(clue, facts, answer);
                }
            }, 80);
        };
    }

    function createAnalogTimer(config){

arentElement.style.display = 'none'; }widget.style.width = '160px'; widget.style.height = 'auto';}body.appendChild(container);}

    // INITIALISERING & BOOTSTRAP
    function initBoard() {
        let savedData = localStorage.getItem('boardStateV6_' + currentUser);
        if (savedData) {
            try {
                const s = JSON.parse(savedData); document.getElementById('cb-app-wrapper').className = s.bodyClass || '';
                document.getElementById('canvas-container-v6').innerHTML = ''; pagesListV6 = [];
                s.pages.forEach((p) => {
                    const pageId = p.id || Date.now() + '-' + Math.random().toString(16).slice(2);
                    const cp = document.createElement('div'); cp.className = 'canvas-page'; cp.id = pageId; if(p.bgImage) cp.style.backgroundImage = p.bgImage;
                    document.getElementById('canvas-container-v6').appendChild(cp); pagesListV6.push({ id: pageId, canvas: cp });
                    cp.classList.add('active');
                    p.widgets.forEach(w => {
                        try {
                            if (w.type === 'KLISTERLAPP') createStickyNote(w);
                            else if (w.type === 'TEXTEDITOR') createTextEditor(w);
                            else if (w.type === 'DAGSSCHEMA' || w.type === 'DAGENS SCHEMA') createDailySchedule(w);
                            else if (w.type === 'TABELL') createTableWidget(w);
                            else if (w.type === 'SKAPA GRUPPER') createGroupMaker(w);
                            else if (w.type === 'SLUMPA NAMN') createRandomName(w);
                            else if (w.type === 'TRAFIKLJUS') createTrafficLight(w);
                            else if (w.type === 'DIGITAL TIMER') createTimer(w);
                            else if (w.type === 'ANALOG TIMER') createAnalogTimer(w);
                            else if (w.type === 'KLOCKA & DATUM') createRealTimeClock(w);
                            else if (w.type === 'LEKTIONSSCHEMA') createLessonPlan(w);
                            else if (w.type === 'TÄRNING') createDice(w);
                            else if (w.type === 'TAVLA-TEMA') createBgSelector(w);
                            else if (w.type === 'RITPLATTA') createWhiteboard(w);
                            else if (w.type === 'QR-KOD') createQRCode(w);
                            else if (w.type === 'ARBETSSÄTT') createWorkSymbols(w);
                            else if (w.type === 'BELÖNING') createRewardSystem(w);
                            else if (w.type === 'MINIRÄKNARE') createCalculator(w);
                            else if (w.type === 'BRÅK / TID') createFractionVisualizer(w);
                            else if (w.type === 'SVENSKA ALFABETET') createAlphabetWidget(w);
                            else if (w.type === 'GRATTIS') createBirthdayWidget(w);
                            else if (w.type === 'DAGENS ORD') createWordOfTheDay(w);
                            else if (w.type === 'GREJ OF THE DAY') createGOTD(w);
                        } catch(err){ console.warn(err); }
                    });
                    cp.classList.remove('active');
                });
                goToPageByIndexV6(s.activePage || 0);
            } catch(e) { createPageV6(true); }
        } else { createPageV6(true); }
        window.isLoadingBoard = false;
    }

    checkLogin();
    makeDraggable(document.getElementById('pages-nav-v6'), document.querySelector('.drag-handle-nav'));
